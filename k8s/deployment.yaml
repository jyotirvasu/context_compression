apiVersion: apps/v1
kind: Deployment
metadata:
  name: context-compression
  namespace: default
  labels:
    app: context-compression
spec:
  replicas: 1
  selector:
    matchLabels:
      app: context-compression
  template:
    metadata:
      labels:
        app: context-compression
    spec:
      containers:
        - name: context-compression
          image: context-compression:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
