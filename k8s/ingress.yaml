apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: context-compression-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: context-compression.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: context-compression-svc
                port:
                  number: 8080
